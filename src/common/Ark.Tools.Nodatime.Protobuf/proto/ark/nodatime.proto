syntax = "proto3";

message LocalDate {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

message LocalDateTime {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
  int64 nanosecond_of_day = 4;
}

message OffsetDateTime {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
  int64 nanosecond_of_day = 4;
  int32 offset_seconds = 5;
}

message Period {
  string value = 1;
}
