syntax = "proto3";

option csharp_namespace = "Ark.MediatorFramework.Sample.GrpcClient";

message LocalDate {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
}

message LocalDateTime {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
  int32 hours = 4;
  int32 minutes = 5;
  int32 seconds = 6;
  int32 nanos = 7;
}

message OffsetDateTime {
  int32 year = 1;
  int32 month = 2;
  int32 day = 3;
  int32 hours = 4;
  int32 minutes = 5;
  int32 seconds = 6;
  int32 nanos = 7;
  Duration utc_offset = 8;
}

message Period {
  string value = 1;
}

message Duration {
  int64 seconds = 1;
  int32 nanos = 2;
}
