syntax = "proto3";

option csharp_namespace = "Ark.MediatorFramework.Sample.GrpcClient";

message ArkBusinessRuleViolation {
  string type = 1;
  string title = 2;
  int32 status = 3;
  string detail = 4;
  string instance = 5;
  map<string, string> extensions = 6;
}

message UploadDocumentMetadata {
  string name = 1;
  string content_type = 2;
}

message UploadDocumentChunk {
  oneof content {
    UploadDocumentMetadata metadata = 1;
    bytes data = 2;
  }
}
